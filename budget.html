<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
  <title>Budget Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <header>
    <nav>
      <a href="index.html"><img src="../images/home.png" alt="Home icon"></a>
      <a href="index.html" class="logo"><img src="../images/vaultora.png" alt="Vaultora logo"></a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <main>
    <h1>Budget Calculator</h1>

    <section id="pick-your-date">
      <!--If u don't know how to do dropdowns search it up bcuz idk either, but it uses these elements-->
      <h2>Pick Your Month:</h2>
      <input type="month" id="dateMonth">
    </section>

    <section id="calculation">
      <form>
        <ul id="inputFields">
          <li class="input-group income">
            <input type="datetime-local" class="date-input">
            <p class="expense-title">Bi-Weekly Income</p>
            <!-- If you click this button it switches between being income or expense -->
            <button class="expense-status" type="button" data-button-id="1">Income</button>
            <input type="number" class="expense-input" value="2500">
          </li>
          <li class="input-group">
            <input type="date" class="date-input">
            <p class="expense-title">Housing/Mortgage</p>
            <!-- If you click this button it switches between being income or expense -->
            <button class="expense-status" type="button" data-button-id="2">Expense</button>
            <input type="number" class="expense-input">
          </li>
          <li class="input-group">
            <input type="date" class="date-input">
            <p class="expense-title">Utilities</p>
            <!-- If you click this button it switches between being income or expense -->
            <button class="expense-status" type="button" data-button-id="3">Expense</button>
            <input type="number" class="expense-input">
          </li>
          <li class="input-group">
            <input type="date" class="date-input">
            <p class="expense-title">Bi-Weekly Income</p>
            <!-- If you click this button it switches between being income or expense -->
            <button class="expense-status" type="button" data-button-id="4">Income</button>
            <input type="number" class="expense-input" value="2500">
          </li>
          <li class="input-group">
            <input type="date" class="date-input">
            <p class="expense-title">Food/Supply</p>
            <!-- If you click this button it switches between being income or expense -->
            <button class="expense-status" type="button" data-button-id="5">Expense</button>
            <input type="number" class="expense-input">
          </li>
        </ul>

      </form>
      <button id="add-new" type="button">Add Category?</button>
      <button id="finish-button" type="submit">Finish</button>
    </section>
    <div id="chart">
      <canvas id="myChart"></canvas>
    </div>
  </main>
  <script type="module" src="scripts.js"></script>
</body>

</html>
